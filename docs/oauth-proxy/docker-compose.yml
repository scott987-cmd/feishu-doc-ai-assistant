# 飞书 OAuth 代理 —— 一键起「nginx(对外) → node 代理(内网) → 飞书」。
# 用法：cp .env.example .env && 填好 && docker compose up -d --build
# 校验：curl http://localhost:8787/healthz   →  {"ok":true}
services:
  oauth-proxy:
    build:
      context: ..                      # = docs/，以便 COPY oauth-proxy-server.mjs
      dockerfile: oauth-proxy/Dockerfile
    env_file: .env
    environment:
      - PORT=8787
      - TRUST_PROXY=1                  # 在 nginx 后面，信任 X-Forwarded-For 取真实 IP
    expose: ["8787"]                   # 只在 compose 内网可见；对外一律走 nginx
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on: [oauth-proxy]
    ports: ["8787:80"]                 # 宿主 8787 → nginx:80 → oauth-proxy:8787（本地测试）
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    # 生产：把 80 换 443 + 挂证书；或在前面再放一层企业网关/SSO（见 nginx.conf 注释）
