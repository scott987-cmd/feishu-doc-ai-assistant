# nginx 反向代理：对外入口，转发到内网的 node 代理。
# 企业级"只让员工能用"——在此处前置 SSO（见下方 auth_request 注释），代理本身只兜底防滥用。
server {
  listen 80;
  server_name _;

  # ── 可选·企业 SSO（oauth2-proxy / Authelia / 你司零信任网关）────────────────
  # 启用后，只有登录了公司身份的请求才放行：
  #   location = /__auth {
  #     internal;
  #     proxy_pass http://oauth2-proxy:4180/oauth2/auth;
  #     proxy_set_header Host $host;
  #     proxy_set_header X-Original-URI $request_uri;
  #   }
  #   # 在下面的 location / 里加：
  #   #   auth_request /__auth;
  #   #   error_page 401 = @sso_login;
  # ─────────────────────────────────────────────────────────────────────────────

  location = /healthz { proxy_pass http://oauth-proxy:8787/healthz; }

  location / {
    proxy_pass http://oauth-proxy:8787;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Origin $http_origin;            # 传给 node 做 Origin 校验
    proxy_set_header X-Proxy-Key $http_x_proxy_key;  # 传共享密钥头（如启用）
    proxy_set_header X-Forwarded-For $remote_addr;   # node TRUST_PROXY=1 才信任
    proxy_read_timeout 30s;
    client_max_body_size 16k;                        # 授权材料很小
  }
}
